name: Mypy

on:
  workflow_call:

jobs:
  type-check:
    if: github.base_ref == 'main' || (github.event_name != 'pull_request' && github.ref_name == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Melon
        uses: actions/checkout@v4
        with:
          repository: otaku-melons/Melon

      - name: Checkout parser
        uses: actions/checkout@v4
        with:
          path: Parsers/${{ github.event.repository.name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Install custom parser dependencies
        if: hashFiles('Parsers/${{ github.event.repository.name }}/requirements.txt')
        run: pip install -r Parsers/${{ github.event.repository.name }}/requirements.txt

      - name: Run Mypy
        run: mypy --install-types --non-interactive Parsers/${{ github.event.repository.name }}
